name: Waka Readme

on:
  schedule:
    # 18:30 UTC daily (~10:30 AM PST / 12:00 AM IST)
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@4647ba778c399e2b59cc06686a36f03b24c185c1 # master as of 2026-05-09
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
